server:
  port: 8081

spring:
  application:
    name: user-service
  profiles:
#    active: cache
    active: default
  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true	
    open-in-view: false # Disable OSIV to prevent anti-patterns, N+1 query issues, and database connection pool exhaustion
#  data:
#    redis:
#      host: localhost
#      port: 6379
#  cache:
#    type: redis
#    redis:
#      time-to-live: 60000

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  observations:
    key-values:
      application: ${spring.application.name}
