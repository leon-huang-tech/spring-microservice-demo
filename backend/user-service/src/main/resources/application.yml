server:
  port: 8081

spring:
  application:
    name: user-service
  profiles:
#    active: cache
    active: default
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommercedb
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:ecommerceuser}
    password: ${DB_PASSWORD:ecommercepass123}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop # none,create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false # Disable OSIV to prevent anti-patterns, N+1 query issues, and database connection pool exhaustion

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin123}@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  observations:
    key-values:
      application: ${spring.application.name}

jwt:
  # Signing Key(not the signature itself). openssl rand -base64 32
  # Signature(HMAC-SHA256(header.payload, secretKey)) = Header + Payload + secretKey
  # Header By {"alg": "HS256", "typ": "JWT"}
  # Payload By .subject(email).issuedAt(...).expiration(...)
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000 # milliseconds, 60000 ms/ 1 minute,3600000 ms/ 1 hour, 86400000 ms/ 24 hours

logging:
  level:
    root: ERROR
    org.springframework: ERROR
    org.hibernate: ERROR