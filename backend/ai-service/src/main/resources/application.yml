server:
  port: 8083

spring:
  application:
    name: ai-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: raguser
    password: ragpass123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1:latest # llama3.1:8b # llama3.2:3b,
          temperature: 0.3 # lower temperature for more deterministic responses, higher for more creative responses. range: 0.0 - 1.0
          num-predict: 2048 # increase for longer responses, decrease for faster responses
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768
        initialize-schema: true

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
  instance:
    prefer-ip-address: false # true
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    com.demo.ai: DEBUG
#    org.springframework.ai.chat.client.advisor: DEBUG