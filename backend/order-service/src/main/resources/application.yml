server:
  port: 8082

spring:
  application:
    name: order-service
  profiles:
    active: cache
#    active: default
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommercedb
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:ecommerceuser}
    password: ${DB_PASSWORD:ecommercepass123}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop # none,create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false # Disable OSIV to prevent anti-patterns, N+1 query issues, and database connection pool exhaustion
    #  data:
#    redis:
#      host: localhost
#      port: 6379
#  cache:
#    type: redis
#    redis:
#      time-to-live: 60000			
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin123}@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      # show-details: when-authorized # always
      show-components: always
  health:
    diskspace:
      enabled: false

  prometheus:
    metrics:
      export:
        enabled: true
  observations:
    key-values:
      application: ${spring.application.name}

logging:
  level:
    root: ERROR
    org.springframework: ERROR
    org.hibernate: ERROR