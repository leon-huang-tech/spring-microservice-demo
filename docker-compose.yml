version: '3.8'

x-eureka-env: &eureka-env
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://admin:admin123@eureka-server:8761/eureka/

services:

  eureka-server:
    build: ./backend/eureka-server
    # container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./backend/user-service
    # container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      <<: *eureka-env
      EUREKA_USERNAME: admin
      EUREKA_PASSWORD: admin123

  order-service:
    build: ./backend/order-service
    # container_name: order-service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      <<: *eureka-env

  ai-service:
      build: ./backend/ai-service
      # container_name: ai-service
      ports:
        - "8083:8083"
      depends_on:
        eureka-server:
          condition: service_healthy
      environment:
        <<: *eureka-env

  api-gateway:
    build: ./backend/api-gateway
    # container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      <<: *eureka-env
      
  frontend:
    build: ./frontend
    # container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
